  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f7;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    body:has(#root:not(:empty)) #app-loading {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loading-app-icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .app-loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.625rem;
      animation: loading-fade-in 0.35s ease;
    }
    @keyframes loading-fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .loading-track {
      position: relative;
      width: 44px;
      height: 2px;
      border-radius: 999px;
      background: #e5e5ea;
      overflow: hidden;
    }
    .loading-track::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 42%;
      height: 100%;
      border-radius: 999px;
      background: #1d1d1f;
      animation: loading-slide 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes loading-slide {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(260%); }
    }
    .loading-label {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #86868b;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .accounting-table { width: auto; table-layout: auto; }
    .accounting-table th,
    .accounting-table td.data-cell { white-space: nowrap; overflow: visible; }
    .accounting-table input.cell-input {
      overflow: visible;
      text-overflow: clip;
      width: auto;
      max-width: none;
      box-sizing: content-box;
      field-sizing: content;
    }
    .picker-wrap {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: none;
    }
    .picker-wrap .picker-text {
      min-width: 0;
      width: auto;
      flex: 0 1 auto;
    }
    .picker-arrow-btn {
      flex: 0 0 22px;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #f9fafb;
      color: #6b7280;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      font-size: 10px;
    }
    .picker-arrow-btn:hover { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }
    .picker-menu {
      position: fixed;
      z-index: 99999;
      max-height: 176px;
      overflow: auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      padding: 4px 0;
    }
    .picker-menu-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      font-size: 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #374151;
    }
    .picker-menu-item:hover { background: #f3f4f6; }
    .picker-menu-item.active { background: #eff6ff; color: #1d4ed8; }
    .table-page-body { flex: 1 1 0; min-height: 0; display: flex; flex-direction: column; }
    .table-scroll-y { flex: 1 1 0; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 0.75rem; }
    .table-scroll-x { overflow-x: auto; overflow-y: visible; }
    .table-action-bar {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 0 0.5rem;
      width: 100%;
      box-sizing: border-box;
    }
    .table-row-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      padding: 0.625rem 1.5rem;
      border-radius: 9999px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
      transition: all .15s;
      border: 1px solid #dbeafe;
      color: #2563eb;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .table-row-btn:hover { background: #eff6ff; }
    .table-row-btn:active { transform: scale(.95); }
    .table-row-btn-remove {
      border-color: #fecaca;
      color: #dc2626;
    }
    .table-row-btn-remove:hover:not(:disabled) { background: #fef2f2; }
    .table-row-btn:disabled { opacity: 0.4; cursor: default; }
    .row-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: color .15s, background .15s;
    }
    .row-action-btn:disabled { opacity: 0.25; cursor: default; }
    .row-action-btn-delete:not(:disabled) { color: #9ca3af; }
    .row-action-btn-delete:not(:disabled):hover { color: #dc2626; background: #fef2f2; }
    .row-action-btn-undo { color: #2563eb; }
    .row-action-btn-undo:hover { color: #1d4ed8; background: #eff6ff; }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: #fff;
      border-bottom: 1px solid rgba(229, 231, 235, 0.8);
      min-height: 3rem;
    }
    .app-header-side {
      flex: 0 1 auto;
      min-width: 0;
      z-index: 1;
    }
    .app-header-side-left { max-width: 46%; }
    .app-header-side-right {
      max-width: 46%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
    .app-header-title {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      white-space: nowrap;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #111827;
      font-size: clamp(0.875rem, 2.2vw + 0.65rem, 1.125rem);
      line-height: 1.2;
      pointer-events: none;
    }
    .app-header-title-nudge {
      transform: translate(calc(-50% + 0.75rem), -50%);
    }
    @media (max-width: 420px) {
      .app-header-title {
        font-size: clamp(0.8125rem, 3.8vw, 1rem);
      }
      .app-header-title-nudge {
        transform: translate(calc(-50% + 0.5rem), -50%);
      }
    }
    html { font-size: calc(16px * var(--app-font-scale, 1)); }
    .font-size-slider {
      width: 100%;
      height: 6px;
      margin: 0;
      accent-color: #2563eb;
      cursor: pointer;
    }
    .font-size-preview {
      margin-top: 0.75rem;
      padding: 0.75rem;
      border-radius: 0.75rem;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      color: #374151;
      text-align: center;
      font-weight: 600;
    }
    .font-size-default-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid #bfdbfe;
      background: #fff;
      color: #2563eb;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .font-size-default-btn:hover { background: #eff6ff; color: #1d4ed8; }
    .font-size-default-btn:disabled { opacity: 0.4; cursor: default; }
    .font-size-confirm-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 0.625rem;
      border-radius: 0.5rem;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .font-size-confirm-btn:hover:not(:disabled) { background: #1d4ed8; }
    .font-size-confirm-btn:disabled { opacity: 0.4; cursor: default; }
    .header-sum-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      min-width: 4.25rem;
      height: 1.875rem;
      padding: 0 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1;
      border: none;
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
      cursor: pointer;
      color: #fff;
      white-space: nowrap;
      transition: background .15s, transform .15s;
    }
    .header-sum-btn:active { transform: scale(.95); }
    .header-sum-btn-total { background: #16a34a; }
    .header-sum-btn-total:hover { background: #15803d; }
    .header-sum-btn-sum { background: #3b82f6; }
    .header-sum-btn-sum:hover { background: #2563eb; }
  </style>
</head>
